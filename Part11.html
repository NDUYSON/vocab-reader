// ===== RENDER =====
const tbody = document.querySelector("#table tbody");

function renderTable(){
  tbody.innerHTML="";
  data.forEach((row,i)=>{
    let tr=document.createElement("tr");
    tr.innerHTML=`<td>${i+1}</td>`+row.map(c=>`<td>${c}</td>`).join("");
    tbody.appendChild(tr);
  });
}
renderTable();

// ===== RANGE =====
const fromSel=document.getElementById("from");
const toSel=document.getElementById("to");

for(let i=1;i<=data.length;i++){
  fromSel.innerHTML+=`<option value="${i}">${i}</option>`;
  toSel.innerHTML+=`<option value="${i}">${i}</option>`;
}

// ===== SPEED =====
const speedSlider=document.getElementById("speedSlider");
const speedValue=document.getElementById("speedValue");
speedSlider.oninput=()=>speedValue.innerText=speedSlider.value;

function getRate(){ return parseFloat(speedSlider.value); }

// ===== SPEECH =====
const synth=window.speechSynthesis;
let isPaused=false;
let isStopped=false;

function speak(text,lang){
  return new Promise(resolve=>{
    if(isStopped) return resolve();

    let u=new SpeechSynthesisUtterance(text);
    u.lang=lang;
    u.rate=lang.includes("en")?getRate():1;

    u.onend=()=>setTimeout(resolve,400);
    synth.speak(u);
  });
}

// ===== CONTROL =====
function pause(){ isPaused=true; synth.pause(); }
function resume(){ isPaused=false; synth.resume(); }
function stop(){ isStopped=true; synth.cancel(); }

// ===== PLAY =====
async function play(){
  isStopped=false;
  isPaused=false;

  let rows=document.querySelectorAll("#table tbody tr");

  for(let i=0;i<rows.length;i++){

    if(isStopped) break;

    while(isPaused){
      await new Promise(r=>setTimeout(r,200));
    }

    rows[i].classList.add("active");

    let word=rows[i].cells[1].innerText;
    let jp=rows[i].cells[5].innerText;
    let ex=rows[i].cells[6].innerText;

    await speak(word,"en-US");
    await speak(jp,"ja-JP");
    await speak(ex,"en-US");

    rows[i].classList.remove("active");
  }
}

// ===== PRACTICE =====
let list=[], index=0, results=[];
let testNo=parseInt(localStorage.getItem("testNo")||"0");

function startPractice(){

  let mode=document.getElementById("mode").value;
  let from=parseInt(fromSel.value)-1;
  let to=parseInt(toSel.value);

  if(mode==="all"){
    if(from>=to){
      alert("From phải nhỏ hơn To");
      return;
    }
    list=data.slice(from,to);
  }

  else if(mode==="random"){
    list=[...data];
  }

  else if(mode==="wrong"){
    let history=JSON.parse(localStorage.getItem("history")||"[]");
    let wrongWords=history.filter(x=>!x.correct).map(x=>x.word);
    list=data.filter(d=>wrongWords.includes(d[0]));
  }

  list=list.sort(()=>Math.random()-0.5);

  index=0;
  results=[];
  nextQ();
}

function nextQ(){
  if(index>=list.length){
    finish();
    return;
  }

  let item=list[index];

  document.getElementById("practiceBox").innerHTML=`
    <h3>${item[4]}</h3>
    <input id="input">
    <button onclick="check()">Check</button>
    <span id="res" style="margin-left:10px;font-weight:bold;"></span>
  `;
}

function check(){
  let input=document.getElementById("input").value.trim().toLowerCase();
  let correct=list[index][0].toLowerCase();

  let ok=input===correct;

  let res=document.getElementById("res");

  if(ok){
    res.innerHTML="✅";
    res.style.color="green";
  }else{
    res.innerHTML="❌ → "+correct;
    res.style.color="red";
  }

  results.push({
    word:correct,
    input,
    correct:ok,
    time:new Date().toLocaleString()
  });

  index++;
  setTimeout(nextQ,1000);
}

function finish(){
  testNo++;
  localStorage.setItem("testNo",testNo);

  let correct=results.filter(r=>r.correct).length;
  let percent=Math.round(correct/results.length*100);

  let html=`Test #${testNo} | ${correct}/${results.length} (${percent}%)`;

  html+=`<table border=1>
  <tr><th>Word</th><th>Answer</th><th>Result</th></tr>`;

  results.forEach(r=>{
    html+=`<tr>
    <td>${r.word}</td>
    <td>${r.input}</td>
    <td style="color:${r.correct?"green":"red"}">
    ${r.correct?"✅":"❌"}
    </td></tr>`;
  });

  html+="</table>";

  document.getElementById("stats").innerHTML=html;

  let history=JSON.parse(localStorage.getItem("history")||"[]");
  history.push(...results);
  localStorage.setItem("history",JSON.stringify(history));
}

// ===== SHARE =====
function shareToGoogle(){

  const FORM_URL="https://docs.google.com/forms/d/e/1FAIpQLSfMzeKxzFSCFXu6ang3xAtBXe4WxtABD5O3ET2wq7WLA_Cyvg/formResponse";
  const user="YENNHI";

  results.forEach(r=>{
    let url=FORM_URL+
    "?entry.1209538915="+testNo+
    "&entry.196067690="+user+
    "&entry.1453610014="+r.word+
    "&entry.215126678="+(r.correct?"Correct":"Wrong")+
    "&entry.1436083569="+r.time;

    fetch(url,{method:"GET",mode:"no-cors"});
  });

  alert("YENNHIの練習記録ができました。ありがとうね、もっと練習しましょう!");
}
