<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study English</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
<h1>📚 YENNHIー高校1の英語練習用サイト</h1>

<div class="container">

  <div class="card" onclick="goTo('Part11.html')">
    <div class="icon">⏰</div>
    <div class="title">Part 1 - Section 1</div>
    <div class="desc">Section 1 動詞と文例、自制</div>
  </div>
  
  <div class="card" onclick="goTo('Part12.html')">
    <div class="icon">⏰</div>
    <div class="title">Part 1 - Section 2</div>
    <div class="desc">Section 2 （準備中）</div>
  </div>
  
  <div class="card" onclick="goTo('Part13.html')">
    <div class="icon">⏰</div>
    <div class="title">Part 1 - Section 3</div>
    <div class="desc">Section 3 （準備中）</div>
  </div>
  
  <div class="card" onclick="goTo('Part14.html')">
    <div class="icon">⏰</div>
    <div class="title">Part 1 - Section 4</div>
    <div class="desc">Section 4 （準備中）</div>
  </div> 
  
  <div class="card" onclick="goTo('Results.html')">
    <div class="icon">💬</div>
    <div class="title">練習結果</div>
    <div class="desc">ランダム単語練習の記録情報</div>
  </div>


</div>

<script>
function goTo(page) {
  window.location.href = page;
}
</script>
</body>
</html>
