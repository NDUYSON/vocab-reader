<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YenNhi-English_高校1年生</title>

<style>
body { font-family: Arial; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px; }
th { background: #f0f0f0; }
tr.active { background-color: #ffeeba; }
button { margin: 5px; padding: 10px; }
</style>
</head>

<body>

<h2>📘 Part1: 文法 x 単語</h2>
<h3>📘 Section 3 前置詞・接続詞</h3>
<button onclick="play()">▶️ Play</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="resume()">▶️ Resume</button>
<button onclick="stop()">⏹ Stop</button>

<br>

Speed EN:
<input type="range" id="speedSlider" min="0.2" max="1.2" step="0.1" value="0.5">
<span id="speedValue">0.5</span>

<label>
  <input type="checkbox" id="shadowMode">
  Shadowing Mode
</label>

<table id="table">
<thead>
<tr>
<th>No</th>
<th>Word</th>
<th>IPA</th>
<th>Type</th>
<th>Meaning VI</th>
<th>Meaning JP</th>
<th>Example</th>
</tr>
</thead>
<tbody></tbody>
</table>

<hr>

<h2>🧠 Practice PRO</h2>

Mode:
<select id="mode">
  <option value="all">All words</option>
  <option value="wrong">Wrong words only</option>
</select>

Số từ:
<select id="count"></select>

<button onclick="startPractice()">▶ Start</button>
<button onclick="shareToGoogle()">📤 練習結果提出</button>

<div id="practiceBox"></div>
<div id="stats"></div>

<script>

// ===== DATA =====
const data = [
["lie","/laɪ/","自動詞","nằm","横になる","I lie on the bed."],
["lay","/leɪ/","他動詞","đặt","置く","I lay the book on the table."],
["rise","/raɪz/","自動詞","tăng lên","上がる","Prices rise."],
["raise","/reɪz/","他動詞","nâng lên","上げる","They raise prices."],
["grow","/ɡroʊ/","自動詞","phát triển","成長する","Children grow fast."],
["bring","/brɪŋ/","他動詞","mang đến","持ってくる","She brings food."],
["exist","/ɪɡˈzɪst/","自動詞","tồn tại","存在する","Life exists here."],
["participate","/pɑːrˈtɪsɪpeɪt/","自動詞","tham gia","参加する","I participate in the event."],
["evolve","/ɪˈvɑːlv/","自動詞","tiến hóa","進化する","Species evolve."],
["dive","/daɪv/","自動詞","lặn","潜る","He dives into water."],
["leap","/liːp/","自動詞","nhảy","跳ぶ","The cat leaps."],
["arrive","/əˈraɪv/","自動詞","đến","到着する","They arrive early."],
["depart","/dɪˈpɑːrt/","自動詞","rời đi","出発する","The train departs."],
["sleep","/sliːp/","自動詞","ngủ","眠る","I sleep well."],
["walk","/wɔːk/","自動詞","đi bộ","歩く","She walks daily."],
["hurry","/ˈhɜːri/","自動詞","vội","急ぐ","We hurry up."],
["return","/rɪˈtɜːrn/","自動詞","trở về","戻る","He returns home."],
["travel","/ˈtrævəl/","自動詞","du lịch","旅行する","They travel a lot."],
["appear","/əˈpɪr/","自動詞","xuất hiện","現れる","He appears suddenly."],
["stare","/ster/","自動詞","nhìn chằm chằm","じっと見る","She stares at me."],
["rain","/reɪn/","自動詞","mưa","雨が降る","It rains today."],
["snow","/snoʊ/","自動詞","tuyết rơi","雪が降る","It snows in winter."],
["become","/bɪˈkʌm/","連結動詞","trở nên","〜になる","He becomes strong."],
["turn","/tɜːrn/","連結動詞","trở thành","〜になる","Leaves turn yellow."],
["come","/kʌm/","自動詞","đến","来る","Come here."],
["go","/ɡoʊ/","自動詞","đi","行く","I go home."],
["fall","/fɔːl/","自動詞","rơi","落ちる","Leaves fall."],
["prove","/pruːv/","他動詞","chứng minh","証明する","He proves it."],
["look","/lʊk/","連結動詞","trông có vẻ","〜のように見える","You look tired."],
["seem","/siːm/","連結動詞","có vẻ","〜のように思われる","She seems happy."],
["sound","/saʊnd/","連結動詞","nghe có vẻ","〜のように聞こえる","That sounds good."],
["smell","/smel/","連結動詞","có mùi","〜の匂いがする","It smells nice."],
["taste","/teɪst/","連結動詞","có vị","〜の味がする","It tastes sweet."],
["stay","/steɪ/","連結動詞","giữ nguyên","〜のままでいる","Stay calm."],
["remain","/rɪˈmeɪn/","連結動詞","vẫn còn","依然として〜","He remains silent."],
["believe","/bɪˈliːv/","他動詞","tin","信じる","I believe you."],
["argue","/ˈɑːrɡjuː/","他動詞","tranh luận","議論する","They argue the case."],
["indicate","/ˈɪndɪkeɪt/","他動詞","chỉ ra","示す","Data indicates growth."],
["imply","/ɪmˈplaɪ/","他動詞","ám chỉ","暗示する","He implies something."],
["estimate","/ˈestɪmeɪt/","他動詞","ước tính","見積もる","They estimate cost."],
["reach","/riːtʃ/","他動詞","đạt tới","達する","We reach the goal."],
["visit","/ˈvɪzɪt/","他動詞","thăm","訪れる","I visit my friend."],
["enter","/ˈentər/","他動詞","vào","入る","He enters the room."],
["approach","/əˈproʊtʃ/","他動詞","tiếp cận","近づく","They approach the car."],
["join","/dʒɔɪn/","他動詞","tham gia","参加する","I join the team."],
["attend","/əˈtend/","他動詞","tham dự","出席する","She attends a meeting."],
["answer","/ˈænsər/","他動詞","trả lời","答える","He answers the question."],
["marry","/ˈmæri/","他動詞","kết hôn","結婚する","She marries him."]
];

// render table
const tbody = document.querySelector("#table tbody");
data.forEach((row, i) => {
    let tr = document.createElement("tr");
    tr.innerHTML = `<td>${i+1}</td>` + row.map(c => `<td>${c}</td>`).join("");
    tbody.appendChild(tr);
});

// ===== SPEED =====
const speedSlider = document.getElementById("speedSlider");
const speedValue = document.getElementById("speedValue");
speedSlider.oninput = () => speedValue.innerText = speedSlider.value;
function getRate(){ return parseFloat(speedSlider.value); }

// ===== SPEECH CONTROL =====
const synth = window.speechSynthesis;
let isPaused = false;
let isStopped = false;
let currentUtterance = null;

function speak(text, lang){
  return new Promise(resolve=>{
    if(isStopped) return resolve();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;

    if(lang.includes("en")) u.rate = getRate();
    else u.rate = 1;

    currentUtterance = u;

    u.onend = ()=> setTimeout(resolve, 500);
    synth.speak(u);
  });
}

// ===== CONTROL BUTTONS =====
function pause(){
  isPaused = true;
  synth.pause();
}

function resume(){
  isPaused = false;
  synth.resume();
}

function stop(){
  isStopped = true;
  synth.cancel();
}

// ===== PLAY =====
async function play() {
    isStopped = false;
    isPaused = false;

    let rows = document.querySelectorAll("#table tbody tr");

    for (let i = 0; i < rows.length; i++) {

        if (isStopped) break;

        while (isPaused) {
            await new Promise(r => setTimeout(r, 200));
        }

        rows[i].classList.add("active");

        let word = rows[i].cells[1].innerText;
        let jp = rows[i].cells[5].innerText;
        let example = rows[i].cells[6].innerText;

        // ✅ WORD → US
        await speak(word, "en-US");

        // ✅ JP → Japanese
        await speak(jp, "ja-JP");

        // ✅ EXAMPLE → US
        await speak(example, "en-US");

        rows[i].classList.remove("active");
    }
}

// ===== PRACTICE =====
const countSelect = document.getElementById("count");
for(let i=1;i<=data.length;i++){
  let op=document.createElement("option");
  op.value=i; op.text=i;
  countSelect.appendChild(op);
}

let list=[], index=0, results=[];
let testNo = parseInt(localStorage.getItem("testNo")||"0");

function startPractice(){
  let count = parseInt(countSelect.value);

  list = data.slice(0, count);
  list = list.sort(()=>Math.random()-0.5);

  index=0;
  results=[];
  nextQ();
}

function nextQ(){
  if(index>=list.length){
    finish();
    return;
  }

  let item=list[index];

  document.getElementById("practiceBox").innerHTML=`
    <h3>JP: ${item[4]}</h3>
    <input id="input">
    <button onclick="check()">Check</button>
    <span id="res" style="margin-left:10px; font-weight:bold;"></span>
  `;
}

function check(){
  let input=document.getElementById("input").value.trim().toLowerCase();
  let correct=list[index][0].toLowerCase();

  let ok = input===correct;
  let resEl=document.getElementById("res");

  if(ok){
    resEl.innerHTML="✅";
    resEl.style.color="green";
  }else{
    resEl.innerHTML="❌ → "+correct;
    resEl.style.color="red";
  }

  results.push({
    word:correct,
    input,
    correct:ok,
    time:new Date().toLocaleString()
  });

  index++;
  setTimeout(nextQ,1000);
}

function finish(){
  testNo++;
  localStorage.setItem("testNo",testNo);

  let correct=results.filter(r=>r.correct).length;
  let percent=Math.round(correct/results.length*100);

  let html=`Test #${testNo} | Score: ${correct}/${results.length} (${percent}%)`;

  html+=`<table border=1>
  <tr><th>Word</th><th>Your Answer</th><th>Result</th></tr>`;

  results.forEach(r=>{
    html+=`<tr>
    <td>${r.word}</td>
    <td>${r.input}</td>
    <td style="color:${r.correct?"green":"red"}">
      ${r.correct?"✅":"❌"}
    </td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("stats").innerHTML=html;

  let history=JSON.parse(localStorage.getItem("history")||"[]");
  history.push(...results);
  localStorage.setItem("history",JSON.stringify(history));
}

// ===== SHARE =====
function shareToGoogle(){
  const FORM_URL="https://docs.google.com/forms/d/e/1FAIpQLSfMzeKxzFSCFXu6ang3xAtBXe4WxtABD5O3ET2wq7WLA_Cyvg/formResponse";
  const user="YENNHI";

  results.forEach(r=>{
    let url=FORM_URL+
    "?entry.1209538915="+testNo+
    "&entry.196067690="+user+
    "&entry.1453610014="+r.word+
    "&entry.215126678="+(r.correct?"Correct":"Wrong")+
    "&entry.1436083569="+r.time;

    fetch(url,{method:"GET",mode:"no-cors"});
  });

  alert("この練習結果を記録しました。ありがとうね、また頑張ろう！！！");
}

</script>

</body>
</html>
