<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practice Result Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #f0f0f0; }

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

.wordList {
  text-align: left;
  max-width: 500px;
}

button {
  padding: 10px;
  margin: 10px 0;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📊 Practice Result Dashboard</h2>

<button onclick="loadData()">Load Result</button>

<table id="table">
<thead>
<tr>
<th>TestNo</th>
<th>Word Results</th>
<th>Accuracy</th>
<th>Time</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vR8ag7GCVICQ2UODNv-BTisrWEmzj3COzlb1CIt9BUzPHO5qwB-PPPTVPTY-X9-D9x6xnHg-MEn2ucI/pub?gid=293872461&single=true&output=csv";

async function loadData(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text
      .trim()
      .replace(/^\ufeff/, "")
      .split(/\r?\n/)
      .map(r => r.split(","));

    // ===== GROUP BY TESTNO =====
    let map = {};

    rows.slice(1).forEach(r => {

      if(r.length < 6) return;

      let testNo = r[1];
      let word   = r[3];
      let result = r[4];
      let time   = r[5];

      if(!map[testNo]){
        map[testNo] = {
          words: [],
          correct: 0,
          total: 0,
          time: time
        };
      }

      map[testNo].words.push({
        word,
        result
      });

      map[testNo].total++;

      if(result === "Correct"){
        map[testNo].correct++;
      }

    });

    // ===== RENDER =====
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    Object.keys(map).sort((a,b)=>a-b).forEach(testNo => {

      let obj = map[testNo];

      let percent = Math.round(obj.correct / obj.total * 100);

      // build word list
      let wordHTML = obj.words.map(w => {
        return `<span class="${w.result==='Correct'?'correct':'wrong'}">
          ${w.word} (${w.result==='Correct'?'✅':'❌'})
        </span>`;
      }).join(", ");

      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${testNo}</td>
        <td class="wordList">${wordHTML}</td>
        <td>${obj.correct}/${obj.total} (${percent}%)</td>
        <td>${obj.time}</td>
      `;

      tbody.appendChild(tr);

    });

  }catch(err){
    console.error(err);
    alert("Không tải được dữ liệu");
  }
}

</script>

</body>
</html>
